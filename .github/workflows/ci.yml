name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ios-demo-build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcresultparser
        run: brew install xcresultparser

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme GentleRemoteStrings \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee xcodebuild.log

      - name: Generate iOS coverage report
        if: always()
        run: xcresultparser --output-format cobertura TestResults.xcresult > ios-coverage.xml

      - name: Parse test results
        if: always()
        run: |
          xcresultparser --output-format junit TestResults.xcresult > test-results.xml
          xcresultparser --output-format txt TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-results.xml
            xcodebuild.log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest-cov

      - name: Run backend tests
        run: |
          python -m pytest backend/tests/ -v \
            --junitxml=backend-test-results.xml \
            --cov=backend/app \
            --cov-report=xml:backend-coverage.xml

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend-test-results.xml
            backend-coverage.xml

      - name: Upload iOS coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ios-coverage.xml
          flags: ios
          fail_ci_if_error: false

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend-coverage.xml
          flags: backend
          fail_ci_if_error: false
